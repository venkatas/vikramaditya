<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="swordGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="40%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="shieldFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#f59e0b" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" rx="40" fill="url(#bgGrad)"/>

  <!-- Outer ring (subtle) -->
  <circle cx="300" cy="280" r="235" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.15"/>
  <circle cx="300" cy="280" r="245" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.08"/>

  <!-- Shield outline -->
  <path d="M300 55 L460 150 L460 300 Q460 420 300 490 Q140 420 140 300 L140 150 Z"
        fill="url(#shieldFill)" stroke="url(#goldGrad)" stroke-width="3.5" filter="url(#shadow)"/>

  <!-- Shield inner border -->
  <path d="M300 80 L440 165 L440 295 Q440 400 300 465 Q160 400 160 295 L160 165 Z"
        fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.25"/>

  <!-- Horizontal divider lines on shield -->
  <line x1="175" y1="180" x2="220" y2="180" stroke="#f59e0b" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <line x1="380" y1="180" x2="425" y2="180" stroke="#f59e0b" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>

  <!-- Central V / Sword composite -->
  <!-- Sword blade (vertical through center of V) -->
  <line x1="300" y1="120" x2="300" y2="410" stroke="url(#swordGrad)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Sword pommel (top circle) -->
  <circle cx="300" cy="115" r="8" fill="#f59e0b" opacity="0.9" filter="url(#glow)"/>
  <circle cx="300" cy="115" r="4" fill="#fbbf24"/>

  <!-- Sword guard / crossbar -->
  <path d="M245 210 Q270 200 300 205 Q330 200 355 210" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="245" cy="210" r="4" fill="#f59e0b" opacity="0.8"/>
  <circle cx="355" cy="210" r="4" fill="#f59e0b" opacity="0.8"/>

  <!-- V shape (wings of the sword / chevron) -->
  <path d="M205 155 L300 350 L395 155" fill="none" stroke="url(#goldGrad)" stroke-width="10"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>

  <!-- Inner V highlight -->
  <path d="M220 170 L300 330 L380 170" fill="none" stroke="#fbbf24" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>

  <!-- Sword tip (diamond) -->
  <path d="M300 400 L308 410 L300 425 L292 410 Z" fill="#f59e0b" opacity="0.85" filter="url(#glow)"/>

  <!-- Circuit / scan line accents (left side) -->
  <line x1="155" y1="230" x2="195" y2="230" stroke="#f59e0b" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="160" y1="250" x2="190" y2="250" stroke="#f59e0b" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <line x1="155" y1="270" x2="200" y2="270" stroke="#f59e0b" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="165" y1="290" x2="195" y2="290" stroke="#f59e0b" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
  <circle cx="155" cy="230" r="2.5" fill="#f59e0b" opacity="0.5"/>
  <circle cx="155" cy="270" r="2.5" fill="#f59e0b" opacity="0.5"/>

  <!-- Circuit / scan line accents (right side) -->
  <line x1="405" y1="230" x2="445" y2="230" stroke="#f59e0b" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="410" y1="250" x2="440" y2="250" stroke="#f59e0b" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <line x1="400" y1="270" x2="445" y2="270" stroke="#f59e0b" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="405" y1="290" x2="435" y2="290" stroke="#f59e0b" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
  <circle cx="445" cy="230" r="2.5" fill="#f59e0b" opacity="0.5"/>
  <circle cx="445" cy="270" r="2.5" fill="#f59e0b" opacity="0.5"/>

  <!-- Small accent dots around shield -->
  <circle cx="300" cy="50" r="2" fill="#f59e0b" opacity="0.4"/>
  <circle cx="465" cy="145" r="2" fill="#f59e0b" opacity="0.3"/>
  <circle cx="135" cy="145" r="2" fill="#f59e0b" opacity="0.3"/>
  <circle cx="465" cy="305" r="2" fill="#f59e0b" opacity="0.2"/>
  <circle cx="135" cy="305" r="2" fill="#f59e0b" opacity="0.2"/>

  <!-- Text: VIKRAMADITYA -->
  <text x="300" y="540" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="36" font-weight="700" letter-spacing="8" fill="url(#goldGrad)" filter="url(#glow)">
    VIKRAMADITYA
  </text>

  <!-- Tagline -->
  <text x="300" y="570" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="12" font-weight="400" letter-spacing="4" fill="#f59e0b" opacity="0.5">
    AUTONOMOUS VAPT PLATFORM
  </text>
</svg>
