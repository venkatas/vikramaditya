<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d32f2f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#inner)" stroke="#ff6b35" stroke-width="3"/>
  <!-- Shield shape -->
  <path d="M256 60 L400 140 L400 280 Q400 380 256 460 Q112 380 112 280 L112 140 Z"
        fill="none" stroke="url(#shield)" stroke-width="6" opacity="0.9" filter="url(#glow)"/>
  <!-- Inner shield -->
  <path d="M256 90 L375 155 L375 275 Q375 360 256 430 Q137 360 137 275 L137 155 Z"
        fill="url(#inner)" stroke="#ff6b35" stroke-width="2" opacity="0.5"/>
  <!-- V letter (stylized sword/chevron) -->
  <path d="M190 160 L256 340 L322 160" fill="none" stroke="#ff6b35" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Crossbar on V (like a sword guard) -->
  <line x1="200" y1="220" x2="312" y2="220" stroke="#ff6b35" stroke-width="4"
        stroke-linecap="round" opacity="0.7"/>
  <!-- Circuit/scan lines (left) -->
  <line x1="145" y1="200" x2="180" y2="200" stroke="#ff6b35" stroke-width="2" opacity="0.4"/>
  <line x1="145" y1="220" x2="170" y2="220" stroke="#ff6b35" stroke-width="2" opacity="0.3"/>
  <line x1="145" y1="240" x2="175" y2="240" stroke="#ff6b35" stroke-width="2" opacity="0.4"/>
  <!-- Circuit/scan lines (right) -->
  <line x1="332" y1="200" x2="367" y2="200" stroke="#ff6b35" stroke-width="2" opacity="0.4"/>
  <line x1="342" y1="220" x2="367" y2="220" stroke="#ff6b35" stroke-width="2" opacity="0.3"/>
  <line x1="337" y1="240" x2="367" y2="240" stroke="#ff6b35" stroke-width="2" opacity="0.4"/>
  <!-- Dots (nodes) -->
  <circle cx="145" cy="200" r="3" fill="#ff6b35" opacity="0.6"/>
  <circle cx="145" cy="240" r="3" fill="#ff6b35" opacity="0.6"/>
  <circle cx="367" cy="200" r="3" fill="#ff6b35" opacity="0.6"/>
  <circle cx="367" cy="240" r="3" fill="#ff6b35" opacity="0.6"/>
  <!-- Sword tip below V -->
  <line x1="256" y1="340" x2="256" y2="380" stroke="#ff6b35" stroke-width="4"
        stroke-linecap="round" opacity="0.8"/>
  <circle cx="256" cy="385" r="4" fill="#ff6b35" opacity="0.6"/>
</svg>
