# Vikramaditya Whitebox — profile ↔ in-scope domain mapping
# Auto-populated from Route53 on first run; edit to override.
profiles:
  client-erp:
    account_id: "111122223333"
    display: "ADF ERP"
    domains:
      - example-prod.invalid
  example-example-data:
    account_id: "444455556666"
    display: "ADF Pranapr"
    domains:
      - example-data.invalid

# Per-engagement runtime defaults
defaults:
  cache_ttl_seconds: 86400
  pmapper_timeout_seconds: 1800
  prowler_timeout_seconds: 1800
  max_secrets_per_source: 500

# Whitebox auto-detect behaviour for vikramaditya.py
whitebox:
  # When set true, autonomous runs (driven by Ollama brain) will run cloud
  # whitebox alongside blackbox without prompting. Default false: explicit
  # opt-in only.
  autonomous_default: false
