# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# A sample workflow which sets up periodic OSV-Scanner scanning for vulnerabilities,
# in addition to a PR check which fails if new vulnerabilities are introduced.
#
# For more examples and options, including how to ignore specific vulnerabilities,
# see https://google.github.io/osv-scanner/github-action/

name: OSV-Scanner

on:
  pull_request:
    branches: [ "main" ]
  merge_group:
    branches: [ "main" ]
  schedule:
    - cron: '31 14 * * 2'
  push:
    branches: [ "main" ]

permissions:
  # Require writing security events to upload SARIF file to security tab
  security-events: write
  # Read commit contents
  contents: read
  # OSV-Scanner v2 reusable workflow declares `actions: read`; a reusable
  # workflow cannot request more than the caller grants, so this must be set
  # here or the run fails at startup (GitHub Actions permission model).
  actions: read

jobs:
  scan-scheduled:
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' }}
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2" # v2.3.8
    with:
      # The dependency scan still runs (results in the job log + fail-on-vuln);
      # only the SARIF upload to Security > Code-Scanning is disabled, because this
      # repo is PRIVATE and code scanning there requires GitHub Advanced Security.
      # Run `osv-scanner -r .` locally for the same scan.
      upload-sarif: false
      scan-args: |-
        -r
        --skip-git
        --config=.osv-scanner.toml
        ./
  scan-pr:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2" # v2.3.8
    with:
      # Same reason as scan-scheduled: this repo is PRIVATE with no GitHub Advanced
      # Security, so the SARIF upload to Security > Code-Scanning fails with
      # "Code scanning is not enabled for this repository" and breaks every PR run.
      # The diff scan + --gh-annotations + fail-on-vuln still run; only the upload is off.
      upload-sarif: false
      scan-args: |-
        -r
        --skip-git
        --config=.osv-scanner.toml
        ./
